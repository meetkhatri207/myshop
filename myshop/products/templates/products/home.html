{% extends 'base.html' %}

{% block content %}

<style>
    .hero {
        min-height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(to right, #111827, #1f2937);
        color: white;
        text-align: center;
        padding: 2rem;
    }

    .hero-content {
        max-width: 700px;
    }

    .hero h1 {
        font-size: 4rem;
        margin-bottom: 1rem;
        font-weight: 800;
    }

    .hero p {
        font-size: 1.2rem;
        color: #d1d5db;
        line-height: 1.8;
        margin-bottom: 2rem;
    }

    .hero-btn {
        display: inline-block;
        padding: 14px 30px;
        background: white;
        color: #111827;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 700;
        transition: 0.3s ease;
    }

    .hero-btn:hover {
        transform: translateY(-3px);
    }
</style>

<section class="hero">

    <div class="hero-content">

        <h1>
            Welcome To MyShop 🛍️
        </h1>

        <p>
            Discover premium products, amazing deals,
            and a modern shopping experience built with Django.
        </p>

        <a href="/products/" class="hero-btn">
            Shop Now
        </a>

    </div>

</section>

{% endblock %}
