{% extends 'base.html' %}

{% block content %}

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #f5f7fb;
    }

    .login-container {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }

    .login-card {
        width: 100%;
        max-width: 450px;
        background: white;
        padding: 40px;
        border-radius: 24px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .login-title {
        font-size: 38px;
        text-align: center;
        margin-bottom: 10px;
        color: #0f172a;
    }

    .login-subtitle {
        text-align: center;
        color: #64748b;
        margin-bottom: 35px;
    }

    .error-message {
        background: #fee2e2;
        color: #dc2626;
        padding: 14px;
        border-radius: 12px;
        margin-bottom: 22px;
        font-weight: bold;
        text-align: center;
    }

    .login-form {
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .input-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .input-label {
        font-weight: bold;
        color: #334155;
    }

    .input-field {
        padding: 15px;
        border: 1px solid #dbe2ea;
        border-radius: 14px;
        outline: none;
        font-size: 15px;
        transition: 0.3s;
    }

    .input-field:focus {
        border-color: #2563eb;
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .login-btn {
        padding: 15px;
        border: none;
        background: #2563eb;
        color: white;
        border-radius: 14px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
    }

    .login-btn:hover {
        background: #1d4ed8;
    }

    .login-footer {
        text-align: center;
        margin-top: 25px;
        color: #64748b;
    }

    .register-link {
        color: #2563eb;
        text-decoration: none;
        font-weight: bold;
    }

    .register-link:hover {
        text-decoration: underline;
    }
</style>

<div class="login-container">

    <div class="login-card">

        <h1 class="login-title">
            Welcome Back 👋
        </h1>

        <p class="login-subtitle">
            Login to continue shopping
        </p>

        {% if error %}

        <div class="error-message">
            {{ error }}
        </div>

        {% endif %}

        <form method="POST" class="login-form">

            {% csrf_token %}

            <div class="input-group">

                <label class="input-label">
                    Username
                </label>

                <input type="text" name="username" placeholder="Enter your username" class="input-field">

            </div>

            <div class="input-group">

                <label class="input-label">
                    Password
                </label>

                <input type="password" name="password" placeholder="Enter your password" class="input-field">

            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <div class="login-footer">

            Don't have an account?

            <a href="/users/register/" class="register-link">
                Register
            </a>

        </div>

    </div>

</div>

{% endblock %}
