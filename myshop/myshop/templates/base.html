{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>My Shop</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">

</head>

<body>

    <!-- Navbar -->

    <nav class="navbar">

        <div class="logo">
            <a href="/products/">My Shop</a>
        </div>

        <div class="nav-links">

            <a href="/products/">Products</a>

            <a href="/cart/">Cart</a>

            <a href="/wishlist/">
                Wishlist
            </a>

            {% if user.is_authenticated %}

            <a href="/users/dashboard/">
                Dashboard
            </a>



            <span class="welcome-text">
                Welcome, {{ user.username }}
            </span>

            <a href="/users/logout/" class="btn logout-btn">
                Logout
            </a>

            {% if user.is_staff %}

            <a href="/dashboard/">

                Admin Dashboard

            </a>

            {% endif %}

            {% else %}

            <a href="/users/login/" class="btn">
                Login
            </a>

            <a href="/users/register/" class="btn register-btn">
                Register
            </a>

            {% endif %}

        </div>

    </nav>

    <!-- Main Content -->

    <main class="container">

        {% block content %}
        {% endblock %}

    </main>

</body>

</html>
